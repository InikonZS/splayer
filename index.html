<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>test-application</title>
        <link rel="stylesheet" type="text/css" href="style.css">
    </head>
    <body>
        <div class="wrapper clearfix">
            <div class="toolbar">
            </div>
            <div class="sidebar">
                    <div class="sidebar_item" id="tool0" onclick="app.selTool(0); app.render();">
                        select
                    </div>
                    <div class="sidebar_item" id="tool1" onclick="app.selTool(1); app.render();">
                        spline
                    </div>
                    <div class="sidebar_item" id="tool1" onclick="scale(sc*2)">
                        zoom+
                    </div>
                    <div class="sidebar_item" id="tool1" onclick="scale(sc/2)">
                        zoom-
                    </div>
            </div>
            <div class="main">
                <canvas width="800px" height="700px" id="wnd" oncontextmenu="return false"></canvas> 
            </div>
            <div class="rightbar">
                    <p>Click left mouse button to draw spline</p>
                    <p>Click right button to finish spline</p>
                    <p>Click right button to select spline and drag markers to edit it</p>
                    <p>Press Delete button to delete selected spline</p>
                    <p>Use tool Select to edit spline by left button</p>
                    <p>Use tool Spline to draw new spline</p>
            </div>
        </div>
        <script src="main.js"></script>
    </body>
</html>
